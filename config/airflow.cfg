# config/airflow.cfg
# =================================================================
# APACHE AIRFLOW PRODUCTION CONFIGURATION
# =================================================================

[core]
# The executor to use. This is the main component that determines
# how tasks are executed
executor = CeleryExecutor

# The number of parallel tasks that can be executed per worker
parallelism = 32

# The maximum number of tasks that can be queued at once
max_active_tasks_per_dag = 16

# Number of DAGs that can run concurrently
dags_are_paused_at_creation = True

# Maximum number of active DAG runs per DAG
max_active_runs_per_dag = 16

# The DAG folder
dags_folder = /opt/airflow/dags

# The plugins folder
plugins_folder = /opt/airflow/plugins

# Base log folder
base_log_folder = /opt/airflow/logs

# Remote logging
remote_logging = False

# Whether to load examples
load_examples = False

# Default timezone
default_timezone = UTC

# Security
secure_mode = True

# Store serialized DAGs in database
store_serialized_dags = True
store_dag_code = True

# DAG discovery
dag_discovery_safe_mode = True
dag_file_processor_timeout = 50

# Kill zombies
killed_task_cleanup_time = 60

[database]
# SQLAlchemy connection string
sql_alchemy_conn = postgresql+psycopg2://airflow:${POSTGRES_PASSWORD}@postgres:5432/airflow

# Connection pool settings
sql_alchemy_pool_size = 5
sql_alchemy_max_overflow = 10
sql_alchemy_pool_pre_ping = True
sql_alchemy_pool_recycle = 3600

[logging]
# Logging level
logging_level = INFO

# Log format
simple_log_format = [%%(asctime)s] {%%(filename)s:%%(lineno)d} %%(levelname)s - %%(message)s
log_format = [%%(asctime)s] {%%(filename)s:%%(lineno)d} %%(levelname)s - %%(message)s

# Colored logs
colored_console_log = False

# Remote logging
remote_logging = False

[metrics]
# StatsD configuration
statsd_on = False
statsd_host = localhost
statsd_port = 8125
statsd_prefix = airflow

[webserver]
# The base URL of your website
base_url = http://localhost:8080

# The port on which to run the web server
web_server_port = 8080

# Number of workers to run the webserver on
workers = 4

# Worker timeout
worker_timeout = 120

# Worker class
worker_class = sync

# Access logformat
access_logformat = %%(h)s %%(l)s %%(u)s %%(t)s "%%(r)s" %%(s)s %%(b)s "%%(f)s" "%%(a)s"

# Expose configuration in the web interface
expose_config = False

# Filter the list of dags by owner name
filter_by_owner = False

# Authentication backend
authenticate = True
auth_backends = airflow.api.auth.backend.basic_auth

# Session configuration
secret_key = ${WEBSERVER_SECRET_KEY}

# RBAC
rbac = True

# Default DAG view
default_dag_view = grid

# Auto-refresh interval
auto_refresh_interval = 30

# Hide paused DAGs by default
hide_paused_dags_by_default = False

[email]
# Email backend
email_backend = airflow.providers.sendgrid.utils.emailer.send_email

# Default email settings
default_email_on_retry = False
default_email_on_failure = False

[smtp]
# SMTP configuration (configure if you need email alerts)
smtp_host = localhost
smtp_starttls = True
smtp_ssl = False
smtp_port = 587
smtp_mail_from = airflow@company.com

[celery]
# Celery configuration
broker_url = redis://:@redis:6379/0
result_backend = db+postgresql://airflow:${POSTGRES_PASSWORD}@postgres:5432/airflow

# Worker configuration
worker_concurrency = 16
worker_log_server_port = 8793

# Task routing
default_queue = default
task_default_queue = default

# Celery app name
celery_app_name = airflow.executors.celery_executor

# Pool settings
pool_pre_ping = True

# Task timeouts
task_soft_time_limit = 0
task_time_limit = 0

# Visibility timeout
visibility_timeout = 21600

[celery_kubernetes_executor]
# Kubernetes configuration (if using K8s executor)
kubernetes_queue = kubernetes

[scheduler]
# Scheduler configuration
catchup_by_default = False

# Number of times the scheduler will check for tasks
max_threads = 2

# DAG directory list interval
dag_dir_list_interval = 300

# Task instance cleanup
job_heartbeat_sec = 5
scheduler_heartbeat_sec = 5

# Number of runs of each DAG to examine per scheduler cycle
max_dagruns_to_create_per_loop = 10

# Max number of DAGs to be turned into DagRun per scheduler cycle
max_dagruns_per_loop_to_schedule = 20

# Enable health check
enable_health_check = True

# Scheduler zombie task cleanup
scheduler_zombie_task_threshold = 300

# Performance settings
parsing_processes = 2
min_file_process_interval = 30

[api]
# API authentication backend
auth_backends = airflow.api.auth.backend.basic_auth

# Enable experimental API
enable_experimental_api = False

# Maximum page limit for API
maximum_page_limit = 100

# API response format
fallback_request_content_type = application/json

[operators]
# Default owner
default_owner = airflow

# Default CPU and memory for tasks
default_cpus = 1
default_ram = 512

# Default retry settings
default_retries = 1
default_retry_delay = 300

[hive]
# Hive configuration (if using Hive)
default_hive_mapred_queue = default

[webserver_config]
# Flask app configuration
SECRET_KEY = ${WEBSERVER_SECRET_KEY}

[kubernetes]
# Kubernetes configuration (if needed)
namespace = default
delete_worker_pods = True
delete_worker_pods_on_success = False
delete_worker_pods_on_failure = False

[secrets]
# Secrets backend (configure if using external secrets)
backend = airflow.providers.hashicorp.secrets.vault.VaultBackend